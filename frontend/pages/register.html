<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCMS — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body class="auth-body">
  <div class="auth-container" style="max-width:500px">
    <div class="auth-brand">
      <div class="brand-icon">⚡</div>
      <h1 class="brand-name">SCMS</h1>
      <p class="brand-tagline">Smart Complaint & Service Management</p>
    </div>
    <div class="auth-card">
      <h2>Create Account</h2>
      <div id="error-msg" class="error-banner" style="display:none"></div>
      <div id="success-msg" class="success-banner" style="display:none"></div>
      <form id="register-form">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="name" placeholder="Your full name" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="email" placeholder="you@email.com" required>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="phone" placeholder="+92 300 0000000">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Department</label>
            <input type="text" id="department" placeholder="e.g. CS Department">
          </div>
          <div class="form-group">
            <label>Role *</label>
            <select id="role">
              <option value="user">Student / Employee</option>
              <option value="technician">Technician</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Password *</label>
            <input type="password" id="password" placeholder="Min 6 characters" required>
          </div>
          <div class="form-group">
            <label>Confirm Password *</label>
            <input type="password" id="confirm" placeholder="Repeat password" required>
          </div>
        </div>
        <button type="submit" class="btn-primary btn-full" id="reg-btn">Create Account</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="login.html">Sign in here</a></p>
    </div>
  </div>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pass = document.getElementById('password').value;
      const conf = document.getElementById('confirm').value;
      if (pass !== conf) { document.getElementById('error-msg').textContent = 'Passwords do not match'; document.getElementById('error-msg').style.display = 'block'; return; }
      const btn = document.getElementById('reg-btn');
      btn.innerHTML = '<span class="spinner"></span> Creating...'; btn.disabled = true;
      const res = await fetch('http://localhost:5000/api/auth/register', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: document.getElementById('name').value, email: document.getElementById('email').value, password: pass, role: document.getElementById('role').value, department: document.getElementById('department').value, phone: document.getElementById('phone').value })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('success-msg').textContent = '✓ Account created! Redirecting to login...';
        document.getElementById('success-msg').style.display = 'block';
        document.getElementById('error-msg').style.display = 'none';
        setTimeout(() => window.location.href = 'login.html', 1800);
      } else {
        document.getElementById('error-msg').textContent = data.message || 'Registration failed';
        document.getElementById('error-msg').style.display = 'block';
        btn.innerHTML = 'Create Account'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
